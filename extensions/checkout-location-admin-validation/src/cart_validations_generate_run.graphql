query Input {
  buyerJourney {
    step
  }
  cart {
    lines {
      quantity
    }
    buyerIdentity {
      customer {
        # Customer metafield used to determine whether the buyer is allowed
        # to complete checkout.
        #
        # If this metafield's value is exactly "admin" (case-insensitive),
        # then the buyer is treated as an admin.
        trigger: metafield(namespace: "checkoutblocks", key: "trigger") {
          value
        }
      }
    }
  }
}
